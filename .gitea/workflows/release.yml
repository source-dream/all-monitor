name: Release

on:
  push:
    tags:
      - '*'
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-and-release:
    name: Build And Publish
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod
          cache-dependency-path: server/go.sum

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Install cross-compile toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Build release artifacts
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: bash ./scripts/ci-release-package.sh

      - name: Verify release files
        run: |
          test -f "dist/all-monitor-${{ github.ref_name }}-linux-amd64.tar.gz"
          test -f "dist/all-monitor-${{ github.ref_name }}-windows-amd64.zip"
          test -f "dist/SHA256SUMS-${{ github.ref_name }}.txt"

      - name: Publish Gitea release
        env:
          GITEA_TOKEN: ${{ secrets.GITEA_TOKEN }}
          TOKEN: ${{ secrets.token }}
          TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
          SERVER_URL: ${{ github.server_url }}
        run: |
          set -euo pipefail

          if [[ -z "${GITEA_TOKEN:-}" && -n "${TOKEN:-}" ]]; then
            GITEA_TOKEN="${TOKEN}"
          fi

          if [[ -z "${GITEA_TOKEN:-}" ]]; then
            echo "GITEA_TOKEN is required" >&2
            exit 1
          fi

          api_base="${SERVER_URL%/}/api/v1/repos/${REPOSITORY}/releases"
          auth_header="Authorization: token ${GITEA_TOKEN}"
          if [[ "${TAG}" == *-* ]]; then
            prerelease_json="true"
          else
            prerelease_json="false"
          fi

          release_json=""
          if release_json="$(curl -fsS -H "${auth_header}" "${api_base}/tags/${TAG}" 2>/dev/null)"; then
            echo "[release] found existing release for tag ${TAG}"
          else
            payload="$(PRERELEASE_JSON="${prerelease_json}" python3 -c 'import json, os; tag = os.environ["TAG"]; prerelease = os.environ.get("PRERELEASE_JSON", "false").lower() == "true"; print(json.dumps({"tag_name": tag, "name": tag, "draft": False, "prerelease": prerelease}))')"
            release_json="$(curl -fsS -X POST "${api_base}" -H "${auth_header}" -H "Content-Type: application/json" -d "${payload}")"
            echo "[release] created release for tag ${TAG}"
          fi

          upload_url="$(python3 -c 'import json, sys; print(json.loads(sys.stdin.read()).get("upload_url", ""))' <<<"${release_json}")"
          upload_url="${upload_url%%\{*}"
          existing_assets="$(python3 -c 'import json, sys; obj = json.loads(sys.stdin.read()); print("\n".join(a.get("name", "") for a in obj.get("assets", [])))' <<<"${release_json}")"

          if [[ -z "${upload_url}" ]]; then
            echo "failed to resolve upload_url from release response" >&2
            exit 1
          fi

          files=(
            "dist/all-monitor-${TAG}-linux-amd64.tar.gz"
            "dist/all-monitor-${TAG}-windows-amd64.zip"
            "dist/SHA256SUMS-${TAG}.txt"
          )

          for file in "${files[@]}"; do
            name="$(basename "${file}")"
            if [[ -n "${existing_assets}" ]] && printf '%s\n' "${existing_assets}" | grep -Fxq "${name}"; then
              echo "[release] skip existing asset ${name}"
              continue
            fi
            curl -fsS -X POST "${upload_url}?name=${name}" -H "${auth_header}" -H "Content-Type: application/octet-stream" --data-binary "@${file}" >/dev/null
            echo "[release] uploaded ${name}"
          done
