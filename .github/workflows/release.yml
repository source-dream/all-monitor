name: Release

on:
  push:
    tags:
      - '*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: server/go.mod

      - name: Install frontend dependencies
        run: npm --prefix web ci

      - name: Install cross-compile toolchain
        run: sudo apt-get update && sudo apt-get install -y gcc-mingw-w64-x86-64 zip

      - name: Build release artifacts
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: bash ./scripts/ci-release-package.sh

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: |
            dist/all-monitor-${{ github.ref_name }}-linux-amd64.tar.gz
            dist/all-monitor-${{ github.ref_name }}-windows-amd64.zip
            dist/SHA256SUMS-${{ github.ref_name }}.txt
